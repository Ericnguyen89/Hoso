# Nginx reverse proxy cho ứng dụng "Hoso - Tạo bìa hồ sơ"
# Domain : bichvan.ibms.io.vn
# Backend: 100.91.128.10:5019 (gunicorn/Flask)
#
# Cài đặt:
#   sudo cp bichvan.ibms.io.vn.conf /etc/nginx/sites-available/bichvan.ibms.io.vn.conf
#   sudo ln -s /etc/nginx/sites-available/bichvan.ibms.io.vn.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Bật HTTPS (Let's Encrypt) sau khi chạy được HTTP:
#   sudo certbot --nginx -d bichvan.ibms.io.vn

upstream hoso_backend {
    server 100.91.128.10:5019;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name bichvan.ibms.io.vn;

    # Cho phép tải tệp Excel lớn (khớp MAX_CONTENT_LENGTH = 50MB của app)
    client_max_body_size 50m;

    # Ghi log riêng cho site này
    access_log /var/log/nginx/bichvan.access.log;
    error_log  /var/log/nginx/bichvan.error.log;

    location / {
        proxy_pass http://hoso_backend;
        proxy_http_version 1.1;

        # Chuyển tiếp thông tin client gốc
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Hỗ trợ kết nối giữ (keepalive) tới backend
        proxy_set_header Connection "";

        # Tăng thời gian chờ vì việc tạo nhiều bìa có thể lâu
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # Trả file tải về trực tiếp, không đệm để tránh chờ
        proxy_buffering off;
    }
}

